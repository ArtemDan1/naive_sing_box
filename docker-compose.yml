services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 10

  fastapi:
    build: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      DOMAIN: ${DOMAIN}
      SINGBOX_CONFIG_PATH: /data/singbox/config.json
      CADDYFILE_PATH: /data/caddy/Caddyfile
      SINGBOX_CONTAINER: singbox
      CADDY_CONTAINER: caddy
    volumes:
      - singbox_conf:/data/singbox
      - caddy_conf:/data/caddy
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres: { condition: service_healthy }
    restart: unless-stopped

  singbox:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: singbox
    command: ["run", "-c", "/etc/sing-box/config.json"]
    volumes:
      - singbox_conf:/etc/sing-box
    restart: unless-stopped

  caddy:
    image: caddy:2
    container_name: caddy
    ports: ["80:80", "443:443"]
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]
    volumes:
      - caddy_conf:/etc/caddy
      - ./caddy/fallback:/srv/fallback:ro
      - caddy_data:/data
    depends_on: [fastapi, singbox]
    restart: unless-stopped

  frontend:
    build: ./frontend
    restart: unless-stopped

volumes:
  pgdata:
  singbox_conf:
  caddy_conf:
  caddy_data:
